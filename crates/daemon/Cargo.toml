[package]
name         = "smarty-pants-daemon"
version.workspace      = true
edition.workspace      = true
license.workspace      = true
repository.workspace   = true
rust-version.workspace = true

[[bin]]
name = "smarty-pants-daemon"
path = "src/main.rs"

[features]
default     = []
vulkan      = []
cuda        = []
rocm        = []
live-model  = []

[dependencies]
smarty-pants-core   = { path = "../core" }
anyhow              = { workspace = true }
thiserror           = { workspace = true }
serde               = { workspace = true }
serde_json          = { workspace = true }
tracing             = { workspace = true }
tracing-subscriber  = { workspace = true }
tokio               = { workspace = true }
tokio-util          = { workspace = true }
futures             = { workspace = true }
async-trait         = { workspace = true }
directories         = { workspace = true }

# llama-cpp-2 requires libclang; will be added when Task 12 starts
# llama-cpp-2         = { version = "0.1", default-features = false }
# wl-clipboard-rs     = "0.9"
# ashpd               = { version = "0.13", default-features = false, features = ["tokio", "global_shortcuts"] }

reqwest             = { version = "0.12", default-features = false, features = ["rustls-tls", "stream"] }
sha2                = "0.10"
hex                 = "0.4"

[dev-dependencies]
insta               = "1"
tempfile            = "3"
